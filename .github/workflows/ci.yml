name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: |
          for i in 1 2 3; do
            cargo install cargo-audit --locked && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: >
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2024-0363
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2024-0411
          --ignore RUSTSEC-2024-0412
          --ignore RUSTSEC-2024-0413
          --ignore RUSTSEC-2024-0414
          --ignore RUSTSEC-2024-0415
          --ignore RUSTSEC-2024-0416
          --ignore RUSTSEC-2024-0417
          --ignore RUSTSEC-2024-0418
          --ignore RUSTSEC-2024-0419
          --ignore RUSTSEC-2024-0420
          --ignore RUSTSEC-2024-0429
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0075
          --ignore RUSTSEC-2025-0080
          --ignore RUSTSEC-2025-0081
          --ignore RUSTSEC-2025-0098
          --ignore RUSTSEC-2025-0100

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust fmt check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
